<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Authentication — Exported from UXMagic Copilot">
    <title>Authentication</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;family=Poppins:wght@100..900&amp;family=Fira+Code:wght@300..700&amp;family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
    <style type="text/tailwindcss">
      @import "tailwindcss";
      @theme inline {
        --color-background: var(--background);
        --color-foreground: var(--foreground);
        --color-primary: var(--primary);
        --color-primary-foreground: var(--primary-foreground);
        --color-secondary: var(--secondary);
        --color-secondary-foreground: var(--secondary-foreground);
        --color-tertiary: var(--tertiary);
        --color-muted: var(--muted);
        --color-muted-foreground: var(--muted-foreground);
        --color-accent: var(--accent);
        --color-destructive: var(--destructive);
        --color-card: var(--card);
        --color-card-foreground: var(--card-foreground);
        --color-border: var(--border);
        --color-input: var(--input);
        --color-ring: var(--ring);
        --radius-sm: calc(var(--radius) - 4px);
        --radius-md: calc(var(--radius) - 2px);
        --radius-lg: var(--radius);
        --font-family-sans: var(--font-sans);
        --font-family-heading: var(--font-heading);
        --font-family-mono: var(--font-mono);
      }
      :root {
        --background: #FFF8F3;
        --foreground: #2C3E5B;
        --primary: #2C3E5B;
        --primary-foreground: #FFFFFF;
        --secondary: #FF7B54;
        --secondary-foreground: #FFFFFF;
        --tertiary: #FFC947;
        --muted: #F5ECE5;
        --muted-foreground: #6E7E91;
        --accent: #FFB499;
        --accent-foreground: #2C3E5B;
        --card: #FFFFFF;
        --card-foreground: #2C3E5B;
        --destructive: #EF4444;
        --border: #EAE1D9;
        --input: #EAE1D9;
        --ring: #FF7B54;
        --radius: 1rem;
        --font-sans: Outfit,sans-serif;
        --font-heading: Outfit,sans-serif;
        --font-mono: JetBrains Mono, monospace;
        --shadow-offset-x: 0;
        --shadow-offset-y: 10;
        --shadow-blur: 30;
        --shadow-spread: -8;
        --shadow-color: rgba(15, 23, 42, 0.12);
        }
    </style>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div data-page="authentication">

<div class="min-h-screen w-full bg-background flex flex-col relative overflow-y-auto font-sans">
  <!-- Top Bar: Status indicators -->
  <div class="px-6 pt-4 pb-2 flex justify-between items-center text-xs text-muted-foreground font-semibold">
    <span>9:41</span>
    <div class="flex items-center gap-1.5">
      <iconify-icon icon="lucide:wifi" class="text-xs"></iconify-icon>
      <iconify-icon icon="lucide:battery" class="text-xs"></iconify-icon>
    </div>
  </div>

  <!-- Hero & Brand Section -->
  <div class="flex-1 px-6 flex flex-col justify-center items-center text-center pt-8 pb-6">
    <div class="w-20 h-20 bg-card rounded-2xl flex items-center justify-center shadow-lg border border-border mb-6">
      <img src="https://uxmagic.blob.core.windows.net/public/agent-images/logo-africana-1783689966642-iwa8rai32sp.png" alt="Africana Logo" class="w-14 h-14 object-contain">
    </div>
    
    <h1 class="text-3xl font-heading font-bold tracking-tight text-foreground mb-3">
      Africana <span class="text-secondary">Driver Connect</span>
    </h1>
    <p class="text-muted-foreground text-sm max-w-xs leading-relaxed">
      Premium, trust-forward transport marketplace connecting elite drivers, fleet owners, and clients.
    </p>
  </div>

  <!-- Authentication Card -->
  <div class="bg-card rounded-t-[2rem] border-t border-border px-6 pt-8 pb-10 shadow-2xl relative z-10">
    <div class="w-12 h-1 bg-muted rounded-full mx-auto mb-6"></div>
    
    <div class="mb-6">
      <h2 class="text-xl font-heading font-bold text-foreground mb-1">Get Started</h2>
      <p class="text-xs text-muted-foreground">Verify your identity instantly via secure OTP.</p>
    </div>

    <!-- Phone input -->
    <div class="space-y-4">
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wider text-muted-foreground mb-2">Phone Number</label>
        <div class="relative flex items-center">
          <div class="absolute left-4 flex items-center gap-1 text-sm font-medium border-r border-border pr-3">
            <span class="text-muted-foreground">🇳🇬</span>
            <span>+234</span>
          </div>
          <input type="tel" placeholder="803 123 4567" class="w-full pl-24 pr-4 py-3.5 bg-muted/50 border border-border rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-all font-medium">
        </div>
      </div>

      <!-- Social login divider -->
      <div class="flex items-center gap-3 py-2">
        <div class="h-px bg-border flex-1"></div>
        <span class="text-[10px] uppercase tracking-wider text-muted-foreground font-semibold">or join with</span>
        <div class="h-px bg-border flex-1"></div>
      </div>

      <!-- Social options -->
      <div class="grid grid-cols-2 gap-3">
        <button class="flex items-center justify-center gap-2 py-3 border border-border rounded-xl bg-background hover:bg-muted/30 transition-all">
          <iconify-icon icon="lucide:globe" class="text-lg text-primary"></iconify-icon>
          <span class="text-xs font-semibold text-foreground">Google</span>
        </button>
        <button class="flex items-center justify-center gap-2 py-3 border border-border rounded-xl bg-background hover:bg-muted/30 transition-all">
          <iconify-icon icon="lucide:smartphone" class="text-lg text-primary"></iconify-icon>
          <span class="text-xs font-semibold text-foreground">Apple</span>
        </button>
      </div>

      <!-- Submit Button -->
      <button class="w-full bg-primary text-primary-foreground py-4 rounded-xl font-semibold shadow-lg hover:bg-primary/95 transition-all flex items-center justify-center gap-2 mt-2">
        <span>Send Verification Code</span>
        <iconify-icon icon="lucide:arrow-right" class="text-lg"></iconify-icon>
      </button>

      <p class="text-[10px] text-center text-muted-foreground leading-relaxed px-4 pt-2">
        By continuing, you agree to Africana's <span class="underline cursor-pointer">Terms of Service</span> and <span class="underline cursor-pointer">Privacy Policy</span>.
      </p>
    </div>
  </div>
</div>

    </div>
    <script src="script.js"></script>
</body>
</html>
