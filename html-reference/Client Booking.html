<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Client Booking — Exported from UXMagic Copilot">
    <title>Client Booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;family=Poppins:wght@100..900&amp;family=Fira+Code:wght@300..700&amp;family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
    <style type="text/tailwindcss">
      @import "tailwindcss";
      @theme inline {
        --color-background: var(--background);
        --color-foreground: var(--foreground);
        --color-primary: var(--primary);
        --color-primary-foreground: var(--primary-foreground);
        --color-secondary: var(--secondary);
        --color-secondary-foreground: var(--secondary-foreground);
        --color-tertiary: var(--tertiary);
        --color-muted: var(--muted);
        --color-muted-foreground: var(--muted-foreground);
        --color-accent: var(--accent);
        --color-destructive: var(--destructive);
        --color-card: var(--card);
        --color-card-foreground: var(--card-foreground);
        --color-border: var(--border);
        --color-input: var(--input);
        --color-ring: var(--ring);
        --radius-sm: calc(var(--radius) - 4px);
        --radius-md: calc(var(--radius) - 2px);
        --radius-lg: var(--radius);
        --font-family-sans: var(--font-sans);
        --font-family-heading: var(--font-heading);
        --font-family-mono: var(--font-mono);
      }
      :root {
        --background: #FFF8F3;
        --foreground: #2C3E5B;
        --primary: #2C3E5B;
        --primary-foreground: #FFFFFF;
        --secondary: #FF7B54;
        --secondary-foreground: #FFFFFF;
        --tertiary: #FFC947;
        --muted: #F5ECE5;
        --muted-foreground: #6E7E91;
        --accent: #FFB499;
        --accent-foreground: #2C3E5B;
        --card: #FFFFFF;
        --card-foreground: #2C3E5B;
        --destructive: #EF4444;
        --border: #EAE1D9;
        --input: #EAE1D9;
        --ring: #FF7B54;
        --radius: 1rem;
        --font-sans: Outfit,sans-serif;
        --font-heading: Outfit,sans-serif;
        --font-mono: JetBrains Mono, monospace;
        --shadow-offset-x: 0;
        --shadow-offset-y: 10;
        --shadow-blur: 30;
        --shadow-spread: -8;
        --shadow-color: rgba(15, 23, 42, 0.12);
        }
    </style>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div data-page="client-booking">

<div class="min-h-screen w-full bg-background flex flex-col relative overflow-y-auto font-sans pb-24">
  <!-- Map Placeholder (Simulated Premium Map UI) -->
  <div class="h-80 bg-muted/50 relative overflow-hidden flex flex-col justify-between p-4">
    <!-- Map visual elements -->
    <div class="absolute inset-0 bg-cover bg-center opacity-45" style="background-image: url('https://images.unsplash.com/photo-1524661135-423995f22d0b?auto=format&amp;fit=crop&amp;w=800&amp;q=80');"></div>
    <div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent"></div>
    
    <!-- Top Bar over Map -->
    <div class="relative z-10 flex justify-between items-center w-full">
      <div class="bg-card/90 backdrop-blur-md px-3.5 py-1.5 rounded-full shadow-sm border border-border flex items-center gap-2">
        <span class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse"></span>
        <span class="text-[10px] font-bold text-foreground">Active tracking on-demand</span>
      </div>
      <button class="w-9 h-9 bg-card/90 backdrop-blur-md rounded-xl flex items-center justify-center text-foreground shadow-sm">
        <iconify-icon icon="lucide:bell" class="text-lg"></iconify-icon>
      </button>
    </div>

    <!-- Active Driver Status -->
    <div class="relative z-10 bg-card border border-border rounded-2xl p-4 shadow-lg flex items-center justify-between">
      <div class="flex items-center gap-3">
        <img src="https://randomuser.me/api/portraits/men/12.jpg" class="w-10 h-10 rounded-full border border-border">
        <div>
          <h3 class="text-xs font-bold text-foreground">Driver Arriving</h3>
          <p class="text-[10px] text-muted-foreground">Adebayo • Toyota Camry (LND-492AA)</p>
        </div>
      </div>
      <span class="text-xs font-bold text-secondary">3 mins away</span>
    </div>
  </div>

  <!-- Booking & Hire Interface -->
  <div class="px-6 pt-4 space-y-6">
    <!-- Destination Search Card -->
    <div class="bg-card border border-border rounded-2xl p-5 shadow-sm space-y-3">
      <h2 class="text-sm font-heading font-bold text-foreground flex items-center gap-2">
        <iconify-icon icon="lucide:search" class="text-base text-secondary"></iconify-icon>
        <span>Where are you going?</span>
      </h2>

      <!-- Input fields -->
      <div class="space-y-2">
        <div class="flex items-center gap-3 p-3 bg-muted/40 rounded-xl border border-border">
          <iconify-icon icon="lucide:map-pin" class="text-emerald-500 text-sm"></iconify-icon>
          <input type="text" value="Radisson Blu, Victoria Island" class="bg-transparent border-none text-xs font-semibold focus:outline-none w-full">
        </div>
        <div class="flex items-center gap-3 p-3 bg-muted/40 rounded-xl border border-border">
          <iconify-icon icon="lucide:map-pin" class="text-secondary text-sm"></iconify-icon>
          <input type="text" placeholder="Enter destination..." class="bg-transparent border-none text-xs font-semibold focus:outline-none w-full">
        </div>
      </div>
    </div>

    <!-- Service Selection -->
    <div>
      <h3 class="text-xs font-bold uppercase tracking-wider text-muted-foreground mb-3">Select Premium Service</h3>
      <div class="grid grid-cols-2 gap-3">
        <!-- Option 1 -->
        <div class="bg-card border-2 border-secondary rounded-2xl p-4 shadow-sm cursor-pointer">
          <div class="flex justify-between items-center mb-2">
            <iconify-icon icon="lucide:zap" class="text-secondary text-xl"></iconify-icon>
            <span class="text-xs font-bold text-foreground">₦8,500</span>
          </div>
          <h4 class="text-xs font-bold text-foreground">Premium Ride</h4>
          <p class="text-[9px] text-muted-foreground mt-1">On-demand luxury sedans</p>
        </div>

        <!-- Option 2 -->
        <div class="bg-card border border-border rounded-2xl p-4 shadow-sm cursor-pointer hover:border-primary/40">
          <div class="flex justify-between items-center mb-2">
            <iconify-icon icon="lucide:user" class="text-primary text-xl"></iconify-icon>
            <span class="text-xs font-bold text-foreground">₦25,000</span>
          </div>
          <h4 class="text-xs font-bold text-foreground">Driver for Hire</h4>
          <p class="text-[9px] text-muted-foreground mt-1">Hire a verified driver for 8 hours</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Nav Bar -->
  <div class="absolute bottom-0 left-0 right-0 bg-card border-t border-border py-2 px-6 flex justify-between items-center z-20">
    <button class="flex flex-col items-center gap-1 text-secondary">
      <iconify-icon icon="lucide:search" class="text-xl"></iconify-icon>
      <span class="text-[9px] font-bold">Book Ride</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-muted-foreground hover:text-foreground">
      <iconify-icon icon="lucide:clock" class="text-xl"></iconify-icon>
      <span class="text-[9px] font-semibold">History</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-muted-foreground hover:text-foreground">
      <iconify-icon icon="lucide:credit-card" class="text-xl"></iconify-icon>
      <span class="text-[9px] font-semibold">Payments</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-muted-foreground hover:text-foreground">
      <iconify-icon icon="lucide:user" class="text-xl"></iconify-icon>
      <span class="text-[9px] font-semibold">Profile</span>
    </button>
  </div>
</div>

    </div>
    <script src="script.js"></script>
</body>
</html>
