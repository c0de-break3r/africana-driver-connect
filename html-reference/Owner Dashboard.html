<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Owner Dashboard — Exported from UXMagic Copilot">
    <title>Owner Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;family=Poppins:wght@100..900&amp;family=Fira+Code:wght@300..700&amp;family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
    <style type="text/tailwindcss">
      @import "tailwindcss";
      @theme inline {
        --color-background: var(--background);
        --color-foreground: var(--foreground);
        --color-primary: var(--primary);
        --color-primary-foreground: var(--primary-foreground);
        --color-secondary: var(--secondary);
        --color-secondary-foreground: var(--secondary-foreground);
        --color-tertiary: var(--tertiary);
        --color-muted: var(--muted);
        --color-muted-foreground: var(--muted-foreground);
        --color-accent: var(--accent);
        --color-destructive: var(--destructive);
        --color-card: var(--card);
        --color-card-foreground: var(--card-foreground);
        --color-border: var(--border);
        --color-input: var(--input);
        --color-ring: var(--ring);
        --radius-sm: calc(var(--radius) - 4px);
        --radius-md: calc(var(--radius) - 2px);
        --radius-lg: var(--radius);
        --font-family-sans: var(--font-sans);
        --font-family-heading: var(--font-heading);
        --font-family-mono: var(--font-mono);
      }
      :root {
        --background: #FFF8F3;
        --foreground: #2C3E5B;
        --primary: #2C3E5B;
        --primary-foreground: #FFFFFF;
        --secondary: #FF7B54;
        --secondary-foreground: #FFFFFF;
        --tertiary: #FFC947;
        --muted: #F5ECE5;
        --muted-foreground: #6E7E91;
        --accent: #FFB499;
        --accent-foreground: #2C3E5B;
        --card: #FFFFFF;
        --card-foreground: #2C3E5B;
        --destructive: #EF4444;
        --border: #EAE1D9;
        --input: #EAE1D9;
        --ring: #FF7B54;
        --radius: 1rem;
        --font-sans: Outfit,sans-serif;
        --font-heading: Outfit,sans-serif;
        --font-mono: JetBrains Mono, monospace;
        --shadow-offset-x: 0;
        --shadow-offset-y: 10;
        --shadow-blur: 30;
        --shadow-spread: -8;
        --shadow-color: rgba(15, 23, 42, 0.12);
        }
    </style>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div data-page="owner-dashboard">

<div class="min-h-screen w-full bg-background flex flex-col relative overflow-y-auto font-sans pb-24">
  <!-- Top Bar: Status & User Panel -->
  <div class="px-6 pt-4 pb-4 bg-card border-b border-border flex justify-between items-center sticky top-0 z-20">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-full bg-secondary/10 flex items-center justify-center text-secondary font-bold">
        FO
      </div>
      <div>
        <h2 class="text-xs font-bold text-muted-foreground uppercase tracking-wider">Fleet Owner</h2>
        <h1 class="text-sm font-heading font-bold text-foreground">Oshodi Motors Ltd</h1>
      </div>
    </div>
    
    <button class="w-10 h-10 bg-secondary text-primary-foreground rounded-xl flex items-center justify-center shadow-md hover:bg-secondary/95 transition-all">
      <iconify-icon icon="lucide:plus" class="text-xl"></iconify-icon>
    </button>
  </div>

  <!-- Stats Overview -->
  <div class="p-6">
    <div class="grid grid-cols-2 gap-4">
      <div class="bg-card border border-border rounded-2xl p-4 shadow-sm">
        <div class="flex justify-between items-center mb-2">
          <span class="text-[10px] uppercase tracking-wider text-muted-foreground font-bold">Active Fleet</span>
          <iconify-icon icon="lucide:layers" class="text-secondary text-base"></iconify-icon>
        </div>
        <p class="text-2xl font-heading font-bold text-foreground">12 <span class="text-xs text-muted-foreground">Vehicles</span></p>
      </div>

      <div class="bg-card border border-border rounded-2xl p-4 shadow-sm">
        <div class="flex justify-between items-center mb-2">
          <span class="text-[10px] uppercase tracking-wider text-muted-foreground font-bold">Total Payouts</span>
          <iconify-icon icon="lucide:credit-card" class="text-secondary text-base"></iconify-icon>
        </div>
        <p class="text-2xl font-heading font-bold text-foreground">₦2.4M</p>
      </div>
    </div>
  </div>

  <!-- Active Vacancies & Job Postings -->
  <div class="px-6 space-y-4">
    <div class="flex justify-between items-center">
      <h2 class="text-sm font-heading font-bold text-foreground uppercase tracking-wider">My Active Vacancies</h2>
      <button class="text-xs font-bold text-secondary hover:underline">Manage All</button>
    </div>

    <!-- Vacancy Card 1 -->
    <div class="bg-card border border-border rounded-xl p-4 shadow-sm">
      <div class="flex justify-between items-start mb-3">
        <div>
          <h3 class="text-xs font-bold text-foreground">Toyota Camry 2022 — Premium Driver Needed</h3>
          <p class="text-[10px] text-muted-foreground">Location: Lekki/Victoria Island</p>
        </div>
        <span class="px-2 py-0.5 bg-emerald-100 text-emerald-700 text-[9px] font-bold rounded-full">3 Applicants</span>
      </div>

      <div class="flex items-center gap-4 text-xs text-muted-foreground border-t border-border pt-3">
        <div class="flex items-center gap-1">
          <iconify-icon icon="lucide:credit-card" class="text-sm text-secondary"></iconify-icon>
          <span>₦150k Monthly</span>
        </div>
        <div class="flex items-center gap-1">
          <iconify-icon icon="lucide:clock" class="text-sm text-secondary"></iconify-icon>
          <span>Posted 2d ago</span>
        </div>
      </div>

      <!-- Applicants Quick View -->
      <div class="mt-4 pt-3 border-t border-border/60">
        <p class="text-[10px] font-bold uppercase tracking-wider text-muted-foreground mb-2">Recent Applicants</p>
        <div class="space-y-2">
          <div class="flex items-center justify-between p-2 bg-muted/40 rounded-lg">
            <div class="flex items-center gap-2">
              <img src="https://randomuser.me/api/portraits/men/12.jpg" class="w-6 h-6 rounded-full">
              <div>
                <p class="text-xs font-bold text-foreground">Kolawole A.</p>
                <p class="text-[9px] text-muted-foreground">5 yrs exp • 4.9 Rating</p>
              </div>
            </div>
            <button class="px-2.5 py-1 bg-primary text-primary-foreground rounded-md text-[10px] font-bold">Review</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Nav Bar -->
  <div class="absolute bottom-0 left-0 right-0 bg-card border-t border-border py-2 px-6 flex justify-between items-center z-20">
    <button class="flex flex-col items-center gap-1 text-secondary">
      <iconify-icon icon="lucide:layout-dashboard" class="text-xl"></iconify-icon>
      <span class="text-[9px] font-bold">Dashboard</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-muted-foreground hover:text-foreground">
      <iconify-icon icon="lucide:layers" class="text-xl"></iconify-icon>
      <span class="text-[9px] font-semibold">Fleet</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-muted-foreground hover:text-foreground">
      <iconify-icon icon="lucide:plus" class="text-xl"></iconify-icon>
      <span class="text-[9px] font-semibold">Post Vacancy</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-muted-foreground hover:text-foreground">
      <iconify-icon icon="lucide:user" class="text-xl"></iconify-icon>
      <span class="text-[9px] font-semibold">Profile</span>
    </button>
  </div>
</div>

    </div>
    <script src="script.js"></script>
</body>
</html>
